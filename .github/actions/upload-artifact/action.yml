name: 'Upload Godot Artifact'
description: 'Upload Godot artifact'
inputs:
  name:
    description: "The artifact name."
    required: true
    default: ${{ github.job }}
  path:
    description: "The path to upload"
    required: true
    default: 'builddir/*'
runs:
  using: "composite"
  steps:
    - name: Upload Godot Artifact
      uses: actions/upload-artifact@v2
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        retention-days: 14
